<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="uYZwMn6jbUHt9NtAmb2Hm-yUNaFxn34INa2PDfpNeIM">
    <title>{% block title %}CosaGuardo{% endblock %}</title>

    {# ── SEO & Open Graph ── #}
    <meta name="description" content="{% block meta_description %}CosaGuardo — Scopri film e serie TV perfetti per te. Consigli personalizzati basati sui tuoi gusti.{% endblock %}">
    <meta name="theme-color" content="#0b1020">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">

    {# Open Graph (WhatsApp, Telegram, Facebook) #}
    <meta property="og:site_name" content="CosaGuardo">
    <meta property="og:title" content="{% block og_title %}CosaGuardo — Scopri cosa guardare{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Consigli personalizzati su film e serie TV in base ai tuoi gusti.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://cosaguardo.onrender.com/static/og-default.jpg{% endblock %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://cosaguardo.onrender.com{% endblock %}">
    <meta property="og:locale" content="it_IT">

    {# Twitter/X Card #}
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block tw_title %}CosaGuardo{% endblock %}">
    <meta name="twitter:description" content="{% block tw_description %}Consigli personalizzati su film e serie TV.{% endblock %}">
    <meta name="twitter:image" content="{% block tw_image %}https://cosaguardo.onrender.com/static/og-default.jpg{% endblock %}">

    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: #121933;
            --card: #161f3d;
            --card-2: #1c2750;
            --text: #f5f7ff;
            --muted: #aab3d1;
            --primary: #6ea8fe;
            --primary-hover: #90bbff;
            --border: rgba(255,255,255,0.10);
            --shadow: 0 10px 30px rgba(0,0,0,0.30);
            --radius: 18px;
            --container: 1120px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { min-height: 100%; overflow-x: hidden; }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110,168,254,0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(56,211,159,0.10), transparent 25%),
                linear-gradient(180deg, #0b1020 0%, #0f1730 100%);
            color: var(--text);
            line-height: 1.5;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container {
            width: 100%;
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 20px;
        }

        .site-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(14px);
            background: rgba(11,16,32,0.75);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary), #9b7bff);
            color: white;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            flex-shrink: 0;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 12px;
            color: var(--muted);
            transition: 0.2s ease;
        }

        .nav-link-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }

        .nav-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            min-width: 20px;
            font-size: 18px;
            line-height: 1;
        }

        .nav-text {
            font-size: 0.92rem;
            line-height: 1;
        }        

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-weight: 700;
            font-size: 0.92rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .nav-logout-btn,
        .nav-login-btn {
            min-height: 38px;
        }

        .btn-primary {
            background: var(--primary);
            color: #08101f;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.04);
            border-color: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
        }

        .main-content {
            flex: 1;
            padding: 10px 0 56px;
        }

        .site-footer {
            border-top: 1px solid var(--border);
            padding: 24px 0 36px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-inner a {
            color: var(--text);
            opacity: 0.85;
        }

        .footer-inner a:hover {
            opacity: 1;
        }

        @media (max-width: 760px) {
            .header-inner {
                min-height: 40px;
                padding: 4px 0;
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }

            .brand {
                gap: 7px;
                font-size: 0.88rem;
            }

            .brand-logo {
                width: 26px;
                height: 26px;
                border-radius: 8px;
                font-size: 0.76rem;
            }

            .brand-text {
                display: none;
            }

            .nav {
                gap: 6px;
                margin-left: auto;
            }

            .nav-links {
                gap: 2px;
            }

            .nav-link-item {
                padding: 7px;
                min-width: 32px;
                border-radius: 10px;
                justify-content: center;
            }

            .nav-icon {
                width: 20px;
                min-width: 20px;
                font-size: 18px;
            }

            .nav-link-item .nav-text,
            .nav-login-btn .nav-text,
            .nav-logout-btn .nav-text {
                display: none;
            }

            .nav-login-btn,
            .nav-logout-btn {
                padding: 7px 9px;
                min-width: 34px;
                border-radius: 10px;
            }

            .main-content {
                padding-top: 0;
            }
        }
    </style>

    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=6">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='icon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="site-wrapper">
        <header class="site-header">
            <div class="container header-inner">
                <a href="/" class="brand">
                    <svg viewBox="0 0 104 112" xmlns="http://www.w3.org/2000/svg" class="brand-icon" aria-hidden="true">
                        <defs>
                            <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6ea8fe"/>
                                <stop offset="100%" style="stop-color:#a78bfa"/>
                            </linearGradient>
                            <linearGradient id="navBg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#1a3060"/>
                                <stop offset="100%" style="stop-color:#28185a"/>
                            </linearGradient>
                        </defs>
                        <rect x="4" y="8" width="96" height="96" rx="26" fill="url(#navBg)"/>
                        <rect x="4" y="8" width="96" height="96" rx="26" fill="none" stroke="url(#navGrad)" stroke-width="1.5" opacity="0.45"/>
                        <path d="M 66 24 A 30 30 0 1 0 66 88" fill="none" stroke="url(#navGrad)" stroke-width="13" stroke-linecap="round"/>
                        <polygon points="65,38 65,74 86,56" fill="url(#navGrad)"/>
                    </svg>
                    <span class="brand-text">CosaGuardo</span>
                </a>

                <nav class="nav">
                    <div class="nav-links">
                        <a href="/" class="nav-link-item" aria-label="Home">
                            <span class="nav-icon"><i data-lucide="home" style="width:18px;height:18px;stroke:currentColor;stroke-width:1.75;"></i></span>
                            <span class="nav-text">Home</span>
                        </a>

                        <a href="/profilo" class="nav-link-item" aria-label="Profilo">
                            <span class="nav-icon"><i data-lucide="user-circle" style="width:18px;height:18px;stroke:currentColor;stroke-width:1.75;"></i></span>
                            <span class="nav-text">Profilo</span>
                        </a>
                    </div>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer class="site-footer">
            <div class="container footer-inner">
                <div>
                    © 2026 CosaGuardo — Scopri cosa guardare in base ai tuoi gusti.
                </div>
                <div>
                    <a href="/">Homepage</a>
                </div>
            </div>
        </footer>
    </div>

    {% block scripts %}{% endblock %}
    <script>
        if (typeof lucide !== "undefined") lucide.createIcons();
    </script>
</body>
</html>
