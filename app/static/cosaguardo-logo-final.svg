<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ea8fe"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3060"/>
      <stop offset="100%" style="stop-color:#28185a"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="4" y="8" width="96" height="96" rx="26" fill="url(#iconBg)"/>
  <rect x="4" y="8" width="96" height="96" rx="26" fill="none"
        stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.45"/>

  <!-- C arc — larger radius, much thicker stroke, fills the square -->
  <path d="M 66 24 A 30 30 0 1 0 66 88"
        fill="none" stroke="url(#brandGrad)" stroke-width="13"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Play triangle — scaled to match the bigger C opening -->
  <polygon points="65,38 65,74 86,56" fill="url(#brandGrad)" filter="url(#glow)"/>

  <!-- WORDMARK -->
  <text x="114" y="68"
        font-size="38" font-weight="800"
        letter-spacing="-1.5"
        fill="white">Cosa</text>

  <text x="229" y="68"
        font-size="38" font-weight="800"
        letter-spacing="-1.5"
        fill="url(#brandGrad)">Guardo</text>

  <text x="115" y="85"
        font-size="10.5" font-weight="500"
        fill="#6ea8fe" opacity="0.6"
        letter-spacing="0.15em">SCOPRI COSA GUARDARE</text>
</svg>
